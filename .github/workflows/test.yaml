name: test
on:
  pull_request:
  push:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: canonical/launch-workshop@v0
        with:
          # canonical/workshop is public, so the built-in GITHUB_TOKEN can read
          # its releases. No personal access token or repository secret needed.
          token: ${{ secrets.GITHUB_TOKEN }}
          workshop: dev-noble

      - run: workshop run dev-noble unit-tests
